# --- task-events channel: documented in both doc sets ---
mp.messaging.incoming.task-events.connector=smallrye-kafka
mp.messaging.incoming.task-events.topic=task-events
mp.messaging.incoming.task-events.failure-strategy=ignore
mp.messaging.incoming.task-events.concurrency=1
mp.messaging.incoming.task-events.enabled=${TASK_EVENTS_CONSUMER_ENABLED:true}

# --- task-reminders channel: real, enabled by default, but undocumented in docs-bad ---
mp.messaging.incoming.task-reminders.connector=smallrye-kafka
mp.messaging.incoming.task-reminders.topic=task-reminders
mp.messaging.incoming.task-reminders.failure-strategy=ignore
mp.messaging.incoming.task-reminders.enabled=${TASK_REMINDERS_CONSUMER_ENABLED:true}

# --- scalability: hardcoded, no override, unlike notification.batch-size below ---
task.cleanup.worker-count=1

# --- contrast: this one IS env-overridable ---
notification.batch-size=${NOTIFICATION_BATCH_SIZE:50}
