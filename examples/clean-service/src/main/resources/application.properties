# Auth credential — sourced from env, never a checked-in default.
linkshortener.auth-credential=${AUTH_CREDENTIAL}

mp.messaging.incoming.click-events.connector=smallrye-kafka
mp.messaging.incoming.click-events.topic=click-events
mp.messaging.incoming.click-events.concurrency=${CLICK_EVENTS_CONCURRENCY:3}
mp.messaging.incoming.click-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.click-events.dead-letter-queue.topic=click-events-dlq

linkshortener.expiry-job.interval=${EXPIRY_JOB_INTERVAL:1h}
